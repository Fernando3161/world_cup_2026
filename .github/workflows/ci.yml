name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate data, tests, and static build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate source data
        run: python scripts/validate_data.py

      - name: Validate local historical source snapshot
        run: python scripts/fetch_historical_results.py validate-local

      - name: Build historical model artifact
        run: |
          python scripts/prepare_historical_results.py
          python scripts/build_historical_elo.py
          python scripts/calibrate_historical_model.py
          python scripts/validate_model.py

      - name: Generate frontend data
        run: python scripts/generate_frontend_data.py

      - name: Run Python tests
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript check
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build static frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
